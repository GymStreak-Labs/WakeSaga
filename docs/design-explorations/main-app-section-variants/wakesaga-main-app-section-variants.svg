<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="2180" viewBox="0 0 1800 2180">
  <defs>
    <style>
      .bg { fill: #f5efe4; }
      .sheetTitle { font-family: Avenir Next, Arial, sans-serif; font-size: 54px; font-weight: 900; fill: #17120d; }
      .sheetSub { font-family: Avenir Next, Arial, sans-serif; font-size: 24px; font-weight: 700; fill: #766c62; }
      .label { font-family: Avenir Next, Arial, sans-serif; font-size: 30px; font-weight: 900; fill: #17120d; }
      .note { font-family: Avenir Next, Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #766c62; }
      .phone { fill: #fffaf1; stroke: #17120d; stroke-width: 8; }
      .screenLine { stroke: #e8dac9; stroke-width: 2; }
      .ink { fill: #17120d; }
      .muted { fill: #766c62; }
      .coral { fill: #ff5a52; }
      .aqua { fill: #9ce9e4; }
      .gold { fill: #ffd05a; }
      .cream { fill: #fff1e7; }
      .white { fill: #ffffff; }
      .soft { fill: #fbf4ea; }
      .card { fill: #ffffff; stroke: #e8dac9; stroke-width: 2; }
      .cardTint { fill: #fff1e7; stroke: #e8dac9; stroke-width: 2; }
      .tabBar { fill: #ffffff; stroke: #e8dac9; stroke-width: 2; }
      .tabActive { fill: #fff1e7; stroke: #ff5a52; stroke-width: 2; }
      .small { font-family: Avenir Next, Arial, sans-serif; font-size: 15px; font-weight: 800; fill: #766c62; }
      .tiny { font-family: Avenir Next, Arial, sans-serif; font-size: 12px; font-weight: 900; fill: #766c62; }
      .body { font-family: Avenir Next, Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #766c62; }
      .bodyInk { font-family: Avenir Next, Arial, sans-serif; font-size: 18px; font-weight: 800; fill: #17120d; }
      .title { font-family: Avenir Next, Arial, sans-serif; font-size: 31px; font-weight: 900; fill: #17120d; }
      .big { font-family: Avenir Next, Arial, sans-serif; font-size: 64px; font-weight: 900; fill: #17120d; }
      .hero { font-family: Avenir Next, Arial, sans-serif; font-size: 42px; font-weight: 900; fill: #17120d; }
      .buttonText { font-family: Avenir Next, Arial, sans-serif; font-size: 18px; font-weight: 900; fill: #ffffff; }
      .outlineText { font-family: Avenir Next, Arial, sans-serif; font-size: 17px; font-weight: 900; fill: #17120d; }
      .tabText { font-family: Avenir Next, Arial, sans-serif; font-size: 12px; font-weight: 900; fill: #766c62; }
      .tabTextActive { font-family: Avenir Next, Arial, sans-serif; font-size: 12px; font-weight: 900; fill: #ff5a52; }
    </style>
    <pattern id="diagonal" width="28" height="28" patternUnits="userSpaceOnUse" patternTransform="rotate(-18)">
      <line x1="0" y1="0" x2="0" y2="28" stroke="#f1dfcc" stroke-width="2"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#17120d" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect class="bg" width="1800" height="2180"/>
  <text x="90" y="92" class="sheetTitle">WakeSaga Main App Section Variants</text>
  <text x="90" y="132" class="sheetSub">Same new design language, different section/tab models. Goal: make the next action obvious.</text>

  <!-- Variant A -->
  <text x="90" y="205" class="label">A. Next Scene Home</text>
  <text x="90" y="235" class="note">State-aware Home</text>
  <g transform="translate(90 270)">
    <rect class="phone" rx="44" width="390" height="844"/>
    <clipPath id="clipA"><rect x="18" y="18" width="354" height="808" rx="34"/></clipPath>
    <g clip-path="url(#clipA)">
      <rect x="18" y="18" width="354" height="808" fill="#fffaf1"/>
      <rect x="18" y="18" width="354" height="808" fill="url(#diagonal)" opacity="0.5"/>
      <circle cx="318" cy="122" r="96" fill="#ffd05a" opacity="0.25"/>
      <path d="M18 560 C120 520 230 590 372 535 L372 826 L18 826 Z" fill="#9ce9e4" opacity="0.35"/>

      <text x="38" y="66" class="tiny">12:17</text>
      <rect x="145" y="42" width="100" height="28" rx="14" fill="#000000"/>
      <text x="38" y="112" class="bodyInk">WakeSaga</text>
      <rect x="288" y="90" width="62" height="32" rx="16" fill="#fff1e7" stroke="#ffd05a"/>
      <text x="304" y="111" class="tiny" fill="#17120d">6:30</text>

      <rect x="38" y="146" width="312" height="52" rx="26" class="white" filter="url(#softShadow)"/>
      <rect x="50" y="156" width="110" height="32" rx="16" class="tabActive"/>
      <text x="82" y="177" class="tabTextActive">Home</text>
      <text x="175" y="177" class="tabText">Lock In</text>
      <text x="244" y="177" class="tabText">Receipts</text>
      <text x="315" y="177" class="tabText">Set</text>

      <text x="38" y="239" class="small" fill="#ff5a52">NEXT SCENE</text>
      <text x="38" y="282" class="hero">Tomorrow's</text>
      <text x="38" y="326" class="hero">Opening</text>
      <text x="38" y="356" class="body">Deep Work arc. Object Hunt armed.</text>

      <rect x="38" y="386" width="312" height="218" rx="8" class="card" filter="url(#softShadow)"/>
      <text x="62" y="446" class="big">6:30</text>
      <text x="230" y="425" class="small">AM</text>
      <rect x="62" y="474" width="118" height="32" rx="16" fill="#9ce9e4"/>
      <text x="78" y="495" class="tiny" fill="#17120d">Deep Work</text>
      <rect x="190" y="474" width="118" height="32" rx="16" fill="#fff1e7" stroke="#ff5a52"/>
      <text x="206" y="495" class="tiny" fill="#17120d">Object Hunt</text>
      <text x="62" y="538" class="bodyInk">Wake jolt cached</text>
      <text x="62" y="566" class="body">Episode unlocks after quest.</text>

      <rect x="62" y="626" width="264" height="54" rx="27" class="coral"/>
      <text x="111" y="660" class="buttonText">Lock Opening</text>

      <g transform="translate(38 706)">
        <rect width="312" height="62" rx="8" class="cardTint"/>
        <circle cx="32" cy="31" r="12" class="coral"/>
        <line x1="45" y1="31" x2="94" y2="31" stroke="#ff5a52" stroke-width="4" stroke-linecap="round"/>
        <circle cx="108" cy="31" r="12" class="gold"/>
        <line x1="121" y1="31" x2="170" y2="31" stroke="#e8dac9" stroke-width="4" stroke-linecap="round"/>
        <circle cx="184" cy="31" r="12" class="aqua"/>
        <line x1="197" y1="31" x2="246" y2="31" stroke="#e8dac9" stroke-width="4" stroke-linecap="round"/>
        <circle cx="260" cy="31" r="12" fill="#ffffff" stroke="#e8dac9" stroke-width="3"/>
      </g>

      <rect x="18" y="766" width="354" height="60" class="tabBar"/>
      <text x="50" y="801" class="tabTextActive">Home</text>
      <text x="125" y="801" class="tabText">Lock In</text>
      <text x="211" y="801" class="tabText">Receipts</text>
      <text x="300" y="801" class="tabText">Settings</text>
    </g>
  </g>

  <!-- Variant B -->
  <text x="510" y="205" class="label">B. Episode Timeline</text>
  <text x="510" y="235" class="note">Visible daily sequence</text>
  <g transform="translate(510 270)">
    <rect class="phone" rx="44" width="390" height="844"/>
    <clipPath id="clipB"><rect x="18" y="18" width="354" height="808" rx="34"/></clipPath>
    <g clip-path="url(#clipB)">
      <rect x="18" y="18" width="354" height="808" fill="#fffaf1"/>
      <rect x="18" y="18" width="354" height="808" fill="url(#diagonal)" opacity="0.45"/>
      <path d="M18 210 C100 158 250 158 372 104 L372 826 L18 826 Z" fill="#fff1e7" opacity="0.75"/>
      <circle cx="332" cy="140" r="86" fill="#ffd05a" opacity="0.22"/>

      <text x="38" y="66" class="tiny">12:17</text>
      <rect x="145" y="42" width="100" height="28" rx="14" fill="#000000"/>
      <text x="38" y="112" class="bodyInk">WakeSaga</text>
      <rect x="278" y="90" width="72" height="32" rx="16" fill="#ffffff" stroke="#e8dac9"/>
      <text x="294" y="111" class="tiny">Home</text>

      <text x="38" y="164" class="small" fill="#ff5a52">EPISODE 001</text>
      <text x="38" y="207" class="hero">Today's</text>
      <text x="38" y="251" class="hero">Timeline</text>
      <text x="38" y="281" class="body">Everything is one sequence.</text>

      <line x1="67" y1="324" x2="67" y2="684" stroke="#e8dac9" stroke-width="4" stroke-linecap="round"/>
      <circle cx="67" cy="340" r="14" class="coral"/>
      <rect x="92" y="312" width="234" height="56" rx="8" class="card"/>
      <text x="112" y="336" class="tiny">TONIGHT</text>
      <text x="112" y="358" class="bodyInk">Opening locked</text>

      <circle cx="67" cy="423" r="14" class="gold"/>
      <rect x="92" y="392" width="258" height="148" rx="8" class="card" filter="url(#softShadow)"/>
      <text x="112" y="418" class="tiny" fill="#ff5a52">ACTIVE NEXT</text>
      <text x="112" y="452" class="title">Wake Quest</text>
      <text x="112" y="481" class="body">Find a random object to prove</text>
      <text x="112" y="506" class="body">you are out of the sleep loop.</text>
      <rect x="112" y="558" width="198" height="48" rx="24" class="coral"/>
      <text x="147" y="588" class="buttonText">Clear Quest</text>

      <circle cx="67" cy="592" r="14" class="aqua"/>
      <rect x="92" y="564" width="234" height="56" rx="8" class="cardTint"/>
      <text x="112" y="588" class="tiny">AFTER QUEST</text>
      <text x="112" y="610" class="bodyInk">Morning Episode</text>

      <circle cx="67" cy="675" r="14" fill="#ffffff" stroke="#e8dac9" stroke-width="3"/>
      <rect x="92" y="648" width="234" height="56" rx="8" class="card"/>
      <text x="112" y="672" class="tiny">FIRST 10 MIN</text>
      <text x="112" y="694" class="bodyInk">Start Deep Work</text>

      <rect x="18" y="766" width="354" height="60" class="tabBar"/>
      <text x="50" y="801" class="tabTextActive">Home</text>
      <text x="125" y="801" class="tabText">Lock In</text>
      <text x="211" y="801" class="tabText">Receipts</text>
      <text x="300" y="801" class="tabText">Settings</text>
    </g>
  </g>

  <!-- Variant C -->
  <text x="930" y="205" class="label">C. Alarm Card First</text>
  <text x="930" y="235" class="note">Alarm utility first</text>
  <g transform="translate(930 270)">
    <rect class="phone" rx="44" width="390" height="844"/>
    <clipPath id="clipC"><rect x="18" y="18" width="354" height="808" rx="34"/></clipPath>
    <g clip-path="url(#clipC)">
      <rect x="18" y="18" width="354" height="808" fill="#fffaf1"/>
      <rect x="18" y="18" width="354" height="808" fill="url(#diagonal)" opacity="0.35"/>
      <path d="M18 115 C112 154 245 70 372 118 L372 826 L18 826 Z" fill="#9ce9e4" opacity="0.25"/>

      <text x="38" y="66" class="tiny">12:17</text>
      <rect x="145" y="42" width="100" height="28" rx="14" fill="#000000"/>
      <text x="38" y="112" class="bodyInk">WakeSaga</text>
      <rect x="286" y="88" width="64" height="34" rx="17" fill="#17120d"/>
      <circle cx="332" cy="105" r="13" fill="#9ce9e4"/>

      <g transform="translate(38 146)">
        <text x="0" y="0" class="small" fill="#ff5a52">TOMORROW</text>
        <text x="0" y="47" class="big">6:30</text>
        <text x="166" y="27" class="small">AM</text>
      </g>

      <rect x="38" y="256" width="312" height="248" rx="8" class="card" filter="url(#softShadow)"/>
      <rect x="62" y="284" width="264" height="44" rx="22" fill="#fff1e7" stroke="#ffd05a"/>
      <text x="82" y="312" class="bodyInk">Alarm fires in 8h 13m</text>
      <rect x="62" y="354" width="122" height="96" rx="8" class="cardTint"/>
      <text x="82" y="384" class="tiny">MISSION</text>
      <text x="82" y="414" class="bodyInk">Deep Work</text>
      <text x="82" y="438" class="small">Episode 001</text>
      <rect x="204" y="354" width="122" height="96" rx="8" class="cardTint"/>
      <text x="224" y="384" class="tiny">QUEST</text>
      <text x="224" y="414" class="bodyInk">Object</text>
      <text x="224" y="438" class="bodyInk">Hunt</text>
      <rect x="62" y="470" width="264" height="54" rx="27" class="coral"/>
      <text x="119" y="504" class="buttonText">Arm Episode</text>

      <text x="38" y="565" class="small" fill="#ff5a52">TODAY'S WAKE RECEIPT</text>
      <rect x="38" y="586" width="312" height="104" rx="8" class="card"/>
      <circle cx="75" cy="638" r="24" class="gold"/>
      <text x="114" y="626" class="bodyInk">5m clear time</text>
      <text x="114" y="653" class="body">No snooze loop today.</text>

      <rect x="38" y="710" width="144" height="42" rx="21" fill="#ffffff" stroke="#e8dac9"/>
      <text x="77" y="737" class="outlineText">Sound</text>
      <rect x="198" y="710" width="152" height="42" rx="21" fill="#ffffff" stroke="#e8dac9"/>
      <text x="236" y="737" class="outlineText">Mission</text>

      <rect x="18" y="766" width="354" height="60" class="tabBar"/>
      <text x="50" y="801" class="tabTextActive">Home</text>
      <text x="125" y="801" class="tabText">Lock In</text>
      <text x="211" y="801" class="tabText">Receipts</text>
      <text x="300" y="801" class="tabText">Settings</text>
    </g>
  </g>

  <!-- Variant D -->
  <text x="1350" y="205" class="label">D. Arc Hub + Tabs</text>
  <text x="1350" y="235" class="note">Adds a durable Arc tab</text>
  <g transform="translate(1350 270)">
    <rect class="phone" rx="44" width="390" height="844"/>
    <clipPath id="clipD"><rect x="18" y="18" width="354" height="808" rx="34"/></clipPath>
    <g clip-path="url(#clipD)">
      <rect x="18" y="18" width="354" height="808" fill="#fffaf1"/>
      <rect x="18" y="18" width="354" height="808" fill="url(#diagonal)" opacity="0.42"/>
      <circle cx="70" cy="158" r="126" fill="#ff5a52" opacity="0.08"/>
      <circle cx="326" cy="112" r="92" fill="#ffd05a" opacity="0.26"/>

      <text x="38" y="66" class="tiny">12:17</text>
      <rect x="145" y="42" width="100" height="28" rx="14" fill="#000000"/>
      <text x="38" y="112" class="bodyInk">WakeSaga</text>
      <rect x="278" y="90" width="72" height="32" rx="16" fill="#fff1e7" stroke="#ffd05a"/>
      <text x="294" y="111" class="tiny">6:30</text>

      <text x="38" y="164" class="small" fill="#ff5a52">CURRENT ARC</text>
      <text x="38" y="207" class="hero">No More</text>
      <text x="38" y="251" class="hero">Snooze Arc</text>

      <rect x="38" y="292" width="312" height="176" rx="8" class="card" filter="url(#softShadow)"/>
      <text x="62" y="328" class="tiny">TODAY'S SCENE</text>
      <text x="62" y="359" class="title">Object Hunt</text>
      <text x="62" y="391" class="bodyInk">at 6:30 AM</text>
      <text x="62" y="421" class="body">Then Morning Episode unlocks</text>
      <text x="62" y="446" class="body">your first Deep Work move.</text>
      <rect x="62" y="470" width="144" height="44" rx="22" class="coral"/>
      <text x="89" y="498" class="buttonText">Open Home</text>

      <text x="38" y="526" class="small" fill="#ff5a52">SECTIONS</text>
      <g transform="translate(38 548)">
        <rect width="144" height="88" rx="8" class="cardTint"/>
        <text x="18" y="35" class="bodyInk">Home</text>
        <text x="18" y="62" class="small">Next action</text>
        <rect x="168" width="144" height="88" rx="8" class="card"/>
        <text x="186" y="35" class="bodyInk">Arc</text>
        <text x="186" y="62" class="small">Stats + goals</text>
        <rect y="104" width="144" height="88" rx="8" class="card"/>
        <text x="18" y="139" class="bodyInk">Lock In</text>
        <text x="18" y="166" class="small">Task clips</text>
        <rect x="168" y="104" width="144" height="88" rx="8" class="card"/>
        <text x="186" y="139" class="bodyInk">Receipts</text>
        <text x="186" y="166" class="small">Cards/history</text>
      </g>

      <rect x="18" y="766" width="354" height="60" class="tabBar"/>
      <text x="42" y="801" class="tabTextActive">Home</text>
      <text x="103" y="801" class="tabText">Arc</text>
      <text x="158" y="801" class="tabText">Lock In</text>
      <text x="235" y="801" class="tabText">Receipts</text>
      <text x="318" y="801" class="tabText">Set</text>
    </g>
  </g>

  <g transform="translate(90 1245)">
    <rect x="0" y="0" width="1620" height="760" rx="22" fill="#fffaf1" stroke="#e8dac9" stroke-width="2"/>
    <text x="40" y="70" class="label">Comparison</text>
    <text x="40" y="112" class="body">All four variants preserve the new WakeSaga surface language: warm paper, coral action, aqua/gold status, bold black type, and anime-training-arc copy.</text>

    <g transform="translate(40 170)">
      <rect width="360" height="500" rx="8" class="cardTint"/>
      <text x="24" y="48" class="title">A. Next Scene</text>
      <text x="24" y="90" class="bodyInk">Best default</text>
      <text x="24" y="128" class="body">Feels like Wayk's simple</text>
      <text x="24" y="154" class="body">protocol, but ownable.</text>
      <text x="24" y="215" class="small" fill="#ff5a52">SECTION MODEL</text>
      <text x="24" y="248" class="body">Home / Lock In / Receipts / Settings</text>
      <text x="24" y="310" class="small" fill="#ff5a52">WHY IT WORKS</text>
      <text x="24" y="343" class="body">The daily sequence lives inside</text>
      <text x="24" y="369" class="body">Home. One CTA owns the screen.</text>
      <rect x="24" y="424" width="210" height="44" rx="22" class="coral"/>
      <text x="61" y="452" class="buttonText">Recommend</text>
    </g>

    <g transform="translate(430 170)">
      <rect width="360" height="500" rx="8" class="card"/>
      <text x="24" y="48" class="title">B. Timeline</text>
      <text x="24" y="90" class="bodyInk">Best for comprehension</text>
      <text x="24" y="128" class="body">Makes the whole product loop</text>
      <text x="24" y="154" class="body">visible without extra taps.</text>
      <text x="24" y="215" class="small" fill="#ff5a52">SECTION MODEL</text>
      <text x="24" y="248" class="body">Same 4 tabs, timeline home.</text>
      <text x="24" y="310" class="small" fill="#ff5a52">RISK</text>
      <text x="24" y="343" class="body">Can become dense if every row</text>
      <text x="24" y="369" class="body">gets too much card treatment.</text>
    </g>

    <g transform="translate(820 170)">
      <rect width="360" height="500" rx="8" class="card"/>
      <text x="24" y="48" class="title">C. Alarm First</text>
      <text x="24" y="90" class="bodyInk">Most instantly intuitive</text>
      <text x="24" y="128" class="body">Starts from the mental model</text>
      <text x="24" y="154" class="body">heavy sleepers already know.</text>
      <text x="24" y="215" class="small" fill="#ff5a52">SECTION MODEL</text>
      <text x="24" y="248" class="body">Home is a true alarm object.</text>
      <text x="24" y="310" class="small" fill="#ff5a52">RISK</text>
      <text x="24" y="343" class="body">Less ownable; could feel like</text>
      <text x="24" y="369" class="body">Wayk with an episode layer.</text>
    </g>

    <g transform="translate(1210 170)">
      <rect width="360" height="500" rx="8" class="card"/>
      <text x="24" y="48" class="title">D. Arc Hub</text>
      <text x="24" y="90" class="bodyInk">Most app-like</text>
      <text x="24" y="128" class="body">Creates a durable Arc section</text>
      <text x="24" y="154" class="body">for stats, goals, growth.</text>
      <text x="24" y="215" class="small" fill="#ff5a52">SECTION MODEL</text>
      <text x="24" y="248" class="body">Home / Arc / Lock In / Receipts / Set</text>
      <text x="24" y="310" class="small" fill="#ff5a52">RISK</text>
      <text x="24" y="343" class="body">Adds navigation weight before</text>
      <text x="24" y="369" class="body">the core loop is habitual.</text>
    </g>
  </g>
</svg>
